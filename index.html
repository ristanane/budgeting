<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgeting Pengeluaran Harian</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #a3b18a; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#d4cfc7] min-h-screen py-8 px-4 flex flex-col items-center gap-6">

    <div class="w-full max-w-6xl flex justify-end">
        <button id="btnLogout" class="bg-[#8fa882] text-white px-5 py-2 rounded-lg text-[10px] font-bold tracking-widest hidden hover:bg-[#3a5a40]">KELUAR</button>
    </div>

    <!-- PIN SCREEN -->
    <div id="pinScreen" class="w-full max-w-sm bg-white rounded-2xl shadow-xl p-8 border border-white/50 text-center">
        <h2 class="text-xl font-bold text-[#343a30] mb-6">MASUKKAN KODE AKSES</h2>
        <input type="password" id="pinInput" maxlength="6" placeholder="••••••" autocomplete="off"
            class="w-full text-center text-3xl tracking-[1em] px-4 py-4 rounded-xl border border-[#d4cfc7] bg-[#fcfaf7] mb-4 focus:outline-none focus:ring-2 focus:ring-[#a3b18a]">
        <button id="btnVerify" class="w-full bg-[#3a5a40] text-white font-bold py-3 rounded-lg hover:bg-[#2d332a]">BUKA APLIKASI</button>
        <p id="pinError" class="text-xs text-red-500 mt-4 hidden">Kode akses salah!</p>
    </div>

    <!-- MAIN APP -->
    <div id="appScreen" class="w-full max-w-6xl flex flex-col md:flex-row items-center md:items-start justify-center gap-6 hidden">
        
        <div class="w-full max-w-md bg-[#e2e7df] rounded-2xl shadow-lg border border-white/50 overflow-hidden">
            <div class="bg-[#8fa882] p-6 text-center text-white"><h1 class="text-2xl font-bold tracking-wide">BUDGETING HARIAN</h1></div>
            <form id="financeForm" class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-[#3a5a40] uppercase mb-1">Tanggal</label>
                    <input type="date" id="tanggal" required class="w-full px-4 py-2.5 rounded-lg border border-[#c5ccbf] bg-white focus:outline-none text-[#343a30]">
                    <p id="hariEstetik" class="text-[10px] text-[#588157] mt-1 font-bold"></p>
                </div>
                <div>
                    <label class="block text-xs font-bold text-[#3a5a40] uppercase mb-1">Kategori</label>
                    <select id="kategori" required class="w-full px-4 py-2.5 rounded-lg border border-[#c5ccbf] bg-white text-[#343a30]">
                        <option value="" disabled selected>Pilih Kategori</option>
                        <option value="Makan & Minum">Makan & Minum</option>
                        <option value="Transportasi">Transportasi</option>
                        <option value="Belanja Online">Belanja Online</option>
                        <option value="Belanja Offline">Belanja Offline</option>
                        <option value="Tagihan & Utilitas">Tagihan & Utilitas</option>
                        <option value="Investasi">Investasi</option>
                        <option value="Kesehatan">Kesehatan</option>
                        <option value="Dana Darurat & Lain-lain">Dana Darurat & Lain-lain</option>
                    </select>
                </div>
                <div><label class="block text-xs font-bold text-[#3a5a40] uppercase mb-1">Keterangan</label><input type="text" id="keterangan" required class="w-full px-4 py-2.5 rounded-lg border border-[#c5ccbf] bg-white"></div>
                <div><label class="block text-xs font-bold text-[#3a5a40] uppercase mb-1">Nominal (Rp)</label><input type="text" id="nominalInput" required class="w-full px-4 py-2.5 rounded-lg border border-[#c5ccbf] bg-white font-bold"></div>
                <button type="submit" id="btnSimpan" class="w-full bg-[#8fa882] text-white font-bold py-3 rounded-lg hover:bg-[#3a5a40]">SIMPAN PENGELUARAN</button>
            </form>
        </div>

        <div class="w-full max-w-lg bg-[#f4f1eb] rounded-2xl shadow-lg p-6 border border-white/50 space-y-4">
            <h2 class="text-sm font-bold text-[#343a30] border-b border-[#e5e1d9] pb-2">DASHBOARD RINGKASAN</h2>
            <div id="statsBox" class="bg-white rounded-xl p-4 border border-[#e5e1d9] text-center">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Total Aktual</p>
                <p id="totalPengeluaran" class="text-2xl font-black text-[#3a5a40]">Rp 0</p>
                <div class="flex justify-center gap-4 text-[10px] text-gray-500 mt-2 border-t pt-2"><span id="anggaranBulanIni">Anggaran: 0</span><span id="selisihBulanIni">Sisa: 0</span></div>
            </div>
            <div class="h-40 p-2"><canvas id="chartPengeluaran"></canvas></div>
            <div id="kategoriContainer" class="space-y-3 max-h-48 overflow-y-auto custom-scroll pr-2"></div>
            <a id="btnToSheet" href="https://docs.google.com/spreadsheets/d/1y3X7_GWuq4Yx-z6xqdD6LogRij_YO7LCM8RlaEpFb9E/edit?usp=sharing" target="_blank" class="block text-center text-[10px] font-bold text-gray-400 hover:text-[#3a5a40]">BUKA DATA LENGKAP</a>
        </div>
    </div>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbw4wDFFVmQr63FUlMkW7jry3ZE3I8e5H-xG5iYlqB1GeGUFNYcxJ9v5-u5DAQuo14j9/exec';
        const inputTanggal = document.getElementById('tanggal');
        const hariEstetik = document.getElementById('hariEstetik');
        inputTanggal.valueAsDate = new Date();
        
        function updateHariEstetik() {
            const tgl = new Date(inputTanggal.value);
            hariEstetik.textContent = tgl.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
        }
        updateHariEstetik();
        inputTanggal.addEventListener('change', updateHariEstetik);

        // Otorisasi & Dashboard
        const pinInput = document.getElementById('pinInput');
        document.getElementById('btnVerify').onclick = () => { if(pinInput.value === "000000") { pinScreen.classList.add('hidden'); appScreen.classList.remove('hidden'); btnLogout.classList.remove('hidden'); muatDashboard(); } else alert('PIN Salah'); };
        
        function muatDashboard() {
            fetch(scriptUrl).then(res => res.json()).then(res => {
                const bIni = res.bulanIni;
                document.getElementById('totalPengeluaran').textContent = 'Rp ' + bIni.totalAktual.toLocaleString('id-ID');
                document.getElementById('anggaranBulanIni').textContent = 'Anggaran: ' + bIni.totalAnggaran.toLocaleString('id-ID');
                document.getElementById('selisihBulanIni').textContent = 'Sisa: ' + bIni.totalSelisih.toLocaleString('id-ID');
                
                let container = document.getElementById('kategoriContainer'); container.innerHTML = '';
                res.budgetKategori.forEach(item => {
                    let persen = Math.round((parseFloat(item.persen.toString().replace('%','')) || 0) * (item.persen.toString().includes('%') ? 1 : 100));
                    container.innerHTML += `
                        <div class="space-y-1">
                            <div class="flex justify-between text-[10px] font-bold text-[#343a30]"><span>${item.kategori}</span><span>${persen}%</span></div>
                            <div class="w-full bg-[#d4cfc7] h-2 rounded-full"><div class="bg-[#8fa882] h-2 rounded-full" style="width: ${Math.min(persen, 100)}%"></div></div>
                        </div>`;
                });
            });
        }
        document.getElementById('financeForm').onsubmit = (e) => { e.preventDefault(); alert('Data terkirim!'); };
    </script>
</body>
</html>
