<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgeting Pengeluaran Harian</title>
    <!-- Tailwind CSS untuk Layout Modern -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js untuk Grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4 flex flex-col items-center justify-start gap-6">

    <!-- WRAPPER UTAMA: HP = Kebawah, PC = Kesamping -->
    <div class="w-full max-w-5xl flex flex-col md:flex-row items-center md:items-start justify-center gap-6">
        
        <!-- ================= LEFT COLUMN: FORM INPUT ================= -->
        <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-purple-50">
            <!-- Header Banner Pastel -->
            <div class="bg-gradient-to-r from-purple-200 via-pink-200 to-blue-200 p-6 text-center border-b border-purple-100">
                <h1 class="text-2xl font-bold text-gray-700 tracking-wide flex items-center justify-center gap-2">
                    💸 Budgeting Harian
                </h1>
                <p class="text-xs text-gray-500 mt-1 italic">Catat pengeluaranmu dengan rapi & estetik</p>
            </div>

            <!-- Form -->
            <form id="financeForm" class="p-6 space-y-4">
                <!-- Tanggal -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Tanggal</label>
                    <input type="date" id="tanggal" required
                        class="w-full px-4 py-2.5 rounded-xl border border-purple-100 bg-purple-50/20 focus:outline-none focus:ring-2 focus:ring-purple-200 text-gray-700 text-sm">
                </div>

                <!-- Kategori -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Kategori</label>
                    <select id="kategori" required
                        class="w-full px-4 py-2.5 rounded-xl border border-amber-100 bg-amber-50/20 focus:outline-none focus:ring-2 focus:ring-amber-200 text-gray-700 text-sm">
                        <option value="" disabled selected>-- Pilih Kategori --</option>
                        <option value="Makan & Minum">🍔 Makan & Minum</option>
                        <option value="Transportasi">🚗 Transportasi</option>
                        <option value="Belanja Online">🛍️ Belanja Online</option>
                        <option value="Belanja Offline">🛒 Belanja Offline</option>
                        <option value="Tagihan & Utilitas">⚡ Tagihan & Utilitas</option>
                        <option value="Investasi">📈 Investasi</option>
                        <option value="Hiburan">🎬 Hiburan</option>
                        <option value="Kesehatan">💊 Kesehatan</option>
                    </select>
                </div>

                <!-- Keterangan -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Keterangan</label>
                    <input type="text" id="keterangan" placeholder="cth: Token listrik / Kopi susu" required
                        class="w-full px-4 py-2.5 rounded-xl border border-blue-100 bg-blue-50/20 focus:outline-none focus:ring-2 focus:ring-blue-200 text-gray-700 text-sm placeholder-gray-300">
                </div>

                <!-- Metode Bayar (Hanya Tunai & Non-Tunai) -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Metode Bayar</label>
                    <select id="metodeBayar" required
                        class="w-full px-4 py-2.5 rounded-xl border border-pink-100 bg-pink-50/20 focus:outline-none focus:ring-2 focus:ring-pink-200 text-gray-700 text-sm">
                        <option value="" disabled selected>-- Pilih Metode --</option>
                        <option value="Tunai">💵 Tunai</option>
                        <option value="Non-Tunai">💳 Non-Tunai</option>
                    </select>
                </div>

                <!-- Nominal (Format Rupiah Otomatis saat diketik) -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Nominal (Rp)</label>
                    <input type="text" id="nominalInput" placeholder="cth: 25.000" required
                        class="w-full px-4 py-2.5 rounded-xl border border-emerald-100 bg-emerald-50/20 focus:outline-none focus:ring-2 focus:ring-emerald-200 text-gray-700 text-sm font-medium placeholder-gray-300">
                </div>

                <!-- Catatan -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Catatan Tambahan (Opsional)</label>
                    <textarea id="catatan" rows="2" placeholder="Catatan kecil..."
                        class="w-full px-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50/30 focus:outline-none focus:ring-2 focus:ring-gray-200 text-gray-700 text-sm placeholder-gray-300 resize-none"></textarea>
                </div>

                <!-- Tombol Simpan -->
                <button type="submit" id="btnSimpan"
                    class="w-full bg-gradient-to-r from-purple-200 via-indigo-200 to-blue-200 hover:from-purple-300 hover:to-blue-300 text-gray-600 font-bold py-3 px-4 rounded-xl shadow-md transition duration-300 transform active:scale-95 text-sm tracking-wide mt-2 cursor-pointer">
                    ✨ Simpan Pengeluaran
                </button>
            </form>

            <!-- Status Pesan Berhasil/Offline -->
            <div id="statusMessage" class="hidden mx-6 mb-6 p-3 rounded-xl text-center text-xs font-medium"></div>
        </div>

        <!-- ================= RIGHT COLUMN: DASHBOARD STATS & CHART ================= -->
        <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 border border-blue-50 space-y-4">
            <h2 class="text-lg font-bold text-gray-600 tracking-wide text-center flex items-center justify-center gap-2">
                📊 Dashboard Ringkasan
            </h2>
            
            <!-- Pengaturan Batas Anggaran -->
            <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100 flex items-center justify-between gap-2 text-xs">
                <span class="text-gray-500 font-medium">Set Budget Bulanan:</span>
                <div class="flex items-center gap-1">
                    <span class="text-gray-400 font-bold">Rp</span>
                    <input type="text" id="budgetLimitInput" value="2.000.000" 
                        class="w-24 px-2 py-1 bg-white border border-gray-200 rounded-lg text-right font-bold text-gray-600 focus:outline-none focus:ring-1 focus:ring-purple-300">
                </div>
            </div>

            <!-- Box Stats Utama -->
            <div id="statsBox" class="bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 rounded-2xl p-4 text-center transition-colors duration-300">
                <p id="statsLabel" class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Total Pengeluaran</p>
                <p id="totalPengeluaran" class="text-2xl font-black text-emerald-600 mt-1">Rp 0</p>
                <p id="sisaBudget" class="text-xs text-emerald-500 font-medium mt-1 italic">Sisa kuota budget: Rp 2.000.000</p>
            </div>

            <!-- Area Grafik -->
            <div class="relative flex justify-center items-center h-56 p-2 bg-slate-50/50 rounded-2xl border border-gray-50">
                <canvas id="chartPengeluaran"></canvas>
                <div id="chartLoading" class="absolute text-xs text-gray-400">Memuat grafik estetik...</div>
            </div>

            <!-- Tombol Shortcut ke Google Sheet -->
            <a id="btnToSheet" href="https://docs.google.com/spreadsheets/d/1y3X7_GWuq4Yx-z6xqdD6LogRij_YO7LCM8RlaEpFb9E/edit?usp=sharing" target="_blank"
                class="w-full block text-center bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-500 font-semibold py-2.5 px-4 rounded-xl text-xs transition duration-200">
                📂 Buka Data Google Sheet Lengkap ↗
            </a>
        </div>

    </div>

    <!-- ================= LOGIKA SISTEM UTAMA ================= -->
    <script>
        // Set tanggal otomatis ke hari ini
        document.getElementById('tanggal').valueAsDate = new Date();

        const form = document.getElementById('financeForm');
        const btnSimpan = document.getElementById('btnSimpan');
        const statusMessage = document.getElementById('statusMessage');
        const totalText = document.getElementById('totalPengeluaran');
        const sisaBudgetText = document.getElementById('sisaBudget');
        const statsBox = document.getElementById('statsBox');
        const statsLabel = document.getElementById('statsLabel');
        const chartLoading = document.getElementById('chartLoading');
        const nominalInput = document.getElementById('nominalInput');
        const budgetLimitInput = document.getElementById('budgetLimitInput');

        // ⚠️ MASUKKAN URL GOOGLE APPS SCRIPT KAMU DISINI
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbw4wDFFVmQr63FUlMkW7jry3ZE3I8e5H-xG5iYlqB1GeGUFNYcxJ9v5-u5DAQuo14j9/exec';
        let myChart = null;
        let globalTotalPengeluaran = 0;

        // --- PENGATUR FORMAT RUPIAH SAAT MENGETIK ---
        function formatRupiahEvent(e) {
            let value = e.target.value.replace(/\D/g, "");
            e.target.value = value ? Number(value).toLocaleString("id-ID") : "";
        }
        nominalInput.addEventListener("input", formatRupiahEvent);
        budgetLimitInput.addEventListener("input", (e) => {
            formatRupiahEvent(e);
            hitungUlangBudget();
        });

        function cleanNominal(str) {
            return Number(str.replace(/\./g, ""));
        }

        // --- LOGIKA HITUNG BUDGET BULANAN ---
        function hitungUlangBudget() {
            let limit = cleanNominal(budgetLimitInput.value) || 0;
            let sisa = limit - globalTotalPengeluaran;

            if (sisa < 0) {
                // Jika over-budget, ubah warna jadi Pink/Merah Pastel
                statsBox.className = "bg-gradient-to-r from-rose-50 to-pink-50 border border-rose-100 rounded-2xl p-4 text-center transition-colors duration-300";
                totalText.className = "text-2xl font-black text-rose-600 mt-1";
                sisaBudgetText.className = "text-xs text-rose-500 font-medium mt-1 italic";
                sisaBudgetText.textContent = `Over-budget sebesar: Rp ${(Math.abs(sisa)).toLocaleString('id-ID')}`;
            } else {
                // Jika aman, warna Hijau Pastel
                statsBox.className = "bg-gradient-to-r from-emerald-50 to-teal-50 border border-emerald-100 rounded-2xl p-4 text-center transition-colors duration-300";
                totalText.className = "text-2xl font-black text-emerald-600 mt-1";
                sisaBudgetText.className = "text-xs text-emerald-500 font-medium mt-1 italic";
                sisaBudgetText.textContent = `Sisa kuota budget: Rp ${sisa.toLocaleString('id-ID')}`;
            }
        }

        // --- FUNGSI AMBIL DATA & GAMBAR GRAFIK ---
        function muatDashboard() {
            fetch(scriptUrl)
            .then(res => res.json())
            .then(res => {
                if(res.status === 'success') {
                    // Gabungkan data online dari Sheet + data offline yang belum terkirim
                    const offlineData = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                    const dataSheet = res.data.concat(offlineData);
                    
                    let total = 0;
                    let kategoriMap = {};

                    dataSheet.forEach(item => {
                        total += item.nominal;
                        kategoriMap[item.kategori] = (kategoriMap[item.kategori] || 0) + item.nominal;
                    });

                    globalTotalPengeluaran = total;
                    totalText.textContent = 'Rp ' + total.toLocaleString('id-ID');
                    hitungUlangBudget();

                    const labels = Object.keys(kategoriMap);
                    const values = Object.values(kategoriMap);

                    chartLoading.classList.add('hidden');
                    if(myChart) { myChart.destroy(); }

                    const ctx = document.getElementById('chartPengeluaran').getContext('2d');
                    myChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: labels,
                            datasets: [{
                                data: values,
                                backgroundColor: [
                                    '#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', 
                                    '#bae1ff', '#e8ceff', '#ffd3e2', '#cffafe'
                                ],
                                borderHoverWidth: 3
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } }
                            }
                        }
                    });
                }
            }).catch(err => {
                console.log("Gagal memuat grafik online (sedang offline)");
                chartLoading.textContent = "Mode Offline: Grafik belum bisa diperbarui";
            });
        }

        // --- INPUT DATA (MENDUKUNG MODE OFFLINE) ---
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            btnSimpan.disabled = true;
            btnSimpan.innerText = '⏳ Menyimpan...';
            statusMessage.className = 'hidden';

            const formData = {
                tanggal: document.getElementById('tanggal').value,
                kategori: document.getElementById('kategori').value,
                keterangan: document.getElementById('keterangan').value,
                metodeBayar: document.getElementById('metodeBayar').value,
                nominal: cleanNominal(nominalInput.value),
                catatan: document.getElementById('catatan').value
            };

            // Jalankan pengiriman data
            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(() => {
                // JIKA BERHASIL ONLINE
                statusMessage.textContent = '🎉 Berhasil disimpan langsung ke Google Sheet!';
                statusMessage.className = 'mx-6 mb-6 p-3 rounded-xl text-center text-xs font-medium bg-emerald-50 text-emerald-600 block';
                suksesResetForm();
            })
            .catch(error => {
                // JIKA GAGAL SINYAL / OFFLINE
                // Simpan data ke dalam antrean lokal browser (Local Storage)
                let queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                queue.push(formData);
                localStorage.setItem('offlineQueue', JSON.stringify(queue));

                statusMessage.textContent = '⚠️ Sinyal jelek/Offline. Data disimpan sementara di HP kamu!';
                statusMessage.className = 'mx-6 mb-6 p-3 rounded-xl text-center text-xs font-medium bg-amber-50 text-amber-600 block';
                suksesResetForm();
            });
        });

        function suksesResetForm() {
            form.reset();
            document.getElementById('tanggal').valueAsDate = new Date();
            btnSimpan.disabled = false;
            btnSimpan.innerText = '✨ Simpan Pengeluaran';
            setTimeout(muatDashboard, 1000);
        }

        // --- SISTEM OTOMATIS KIRIM DATA OFFLINE SAAT KEMBALI ONLINE ---
        window.addEventListener('online', function() {
            let queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
            if(queue.length === 0) return;

            statusMessage.textContent = '⚡ Sinyal kembali! Mengirim data offline yang tertunda ke Sheet...';
            statusMessage.className = 'mx-6 mb-6 p-3 rounded-xl text-center text-xs font-medium bg-blue-50 text-blue-600 block';

            // Kirim data satu per satu
            let promises = queue.map(data => {
                return fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
            });

            Promise.all(promises).then(() => {
                localStorage.removeItem('offlineQueue'); // Kosongkan antrean jika sukses
                statusMessage.textContent = '🎉 Semua data offline berhasil disinkronkan ke Google Sheet!';
                statusMessage.className = 'mx-6 mb-6 p-3 rounded-xl text-center text-xs font-medium bg-emerald-50 text-emerald-600 block';
                muatDashboard();
            });
        });

        // Jalankan dashboard saat web dibuka
        muatDashboard();
    </script>
</body>
</html>
