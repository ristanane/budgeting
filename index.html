<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgeting Pengeluaran Harian</title>
    <!-- Menggunakan Tailwind CSS untuk desain yang rapi dan responsif -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #f7f9fc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-amber-100">
        <!-- Header Banner Pastel -->
        <div class="bg-gradient-to-r from-purple-200 via-indigo-200 to-blue-200 p-6 text-center border-b border-indigo-100">
            <h1 class="text-2xl font-bold text-gray-700 tracking-wide flex items-center justify-center gap-2">
                💸 Budgeting Harian
            </h1>
            <p class="text-xs text-gray-500 mt-1 italic">Catat pengeluaranmu dengan rapi & estetik</p>
        </div>

        <!-- Form Input -->
        <form id="financeForm" class="p-6 space-y-4">
            
            <!-- Tanggal (Pastel Purple Accent) -->
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Tanggal</label>
                <input type="date" id="tanggal" required
                    class="w-full px-4 py-2.5 rounded-xl border border-purple-200 bg-purple-50/30 focus:outline-none focus:ring-2 focus:ring-purple-300 text-gray-700 text-sm">
            </div>

            <!-- Kategori (Pastel Yellow Accent) -->
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Kategori</label>
                <select id="kategori" required
                    class="w-full px-4 py-2.5 rounded-xl border border-amber-200 bg-amber-50/30 focus:outline-none focus:ring-2 focus:ring-amber-300 text-gray-700 text-sm">
                    <option value="" disabled selected>-- Pilih Kategori --</option>
                    <option value="Makan & Minum">🍔 Makan & Minum</option>
                    <option value="Transportasi">🚗 Transportasi</option>
                    <option value="Belanja Online">🛍️ Belanja Online</option>
                    <option value="Tagihan & Utilitas">⚡ Tagihan & Utilitas</option>
                    <option value="Investasi">📈 Investasi</option>
                    <option value="Hiburan">🎬 Hiburan</option>
                    <option value="Kesehatan">💊 Kesehatan</option>
                </select>
            </div>

            <!-- Keterangan (Pastel Blue Accent) -->
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Keterangan / Nama Barang</label>
                <input type="text" id="keterangan" placeholder="cth: Kopi susu moka" required
                    class="w-full px-4 py-2.5 rounded-xl border border-blue-200 bg-blue-50/30 focus:outline-none focus:ring-2 focus:ring-blue-300 text-gray-700 text-sm placeholder-gray-400">
            </div>

            <!-- Metode Bayar (Pastel Pink Accent) -->
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Metode Bayar</label>
                <select id="metodeBayar" required
                    class="w-full px-4 py-2.5 rounded-xl border border-pink-200 bg-pink-50/30 focus:outline-none focus:ring-2 focus:ring-pink-300 text-gray-700 text-sm">
                    <option value="" disabled selected>-- Pilih Metode --</option>
                    <option value="Tunai">💵 Tunai</option>
                    <option value="E-Wallet">📱 E-Wallet</option>
                    <option value="QRIS">📷 QRIS</option>
                    <option value="Transfer">🏦 Transfer</option>
                    <option value="Kartu Debit">💳 Kartu Debit</option>
                </select>
            </div>

            <!-- Nominal (Pastel Green Accent) -->
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Nominal (Rp)</label>
                <input type="number" id="nominal" placeholder="cth: 25000" required
                    class="w-full px-4 py-2.5 rounded-xl border border-emerald-200 bg-emerald-50/30 focus:outline-none focus:ring-2 focus:ring-emerald-300 text-gray-700 text-sm placeholder-gray-400">
            </div>

            <!-- Catatan (Pastel Gray Accent) -->
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Catatan Tambahan (Opsional)</label>
                <textarea id="catatan" rows="2" placeholder="Catatan kecil..."
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50/50 focus:outline-none focus:ring-2 focus:ring-gray-300 text-gray-700 text-sm placeholder-gray-400 resize-none"></textarea>
            </div>

            <!-- Tombol Submit -->
            <button type="submit" id="btnSimpan"
                class="w-full bg-gradient-to-r from-purple-300 via-indigo-300 to-blue-300 hover:from-purple-400 hover:to-blue-400 text-gray-700 font-bold py-3 px-4 rounded-xl shadow-md transition duration-300 transform active:scale-95 text-sm tracking-wide mt-2 cursor-pointer">
                ✨ Simpan Pengeluaran
            </button>
        </form>

        <!-- Status Pesan -->
        <div id="statusMessage" class="hidden mx-6 mb-6 p-3 rounded-xl text-center text-xs font-medium"></div>
    </div>

    <!-- Sistem Logika Pengiriman Data -->
    <script>
        // Set tanggal otomatis ke hari ini saat web dibuka
        document.getElementById('tanggal').valueAsDate = new Date();

        const form = document.getElementById('financeForm');
        const btnSimpan = document.getElementById('btnSimpan');
        const statusMessage = document.getElementById('statusMessage');

        // ⚠️ GANTI DENGAN URL GOOGLE APPS SCRIPT KAMU
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbw4wDFFVmQr63FUlMkW7jry3ZE3I8e5H-xG5iYlqB1GeGUFNYcxJ9v5-u5DAQuo14j9/exec';

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Ubah tombol jadi mode loading
            btnSimpan.disabled = true;
            btnSimpan.innerText = '⏳ Menyimpan data ke Sheet...';
            statusMessage.className = 'hidden';

            // Kumpulkan data dari form input
            const formData = {
                tanggal: document.getElementById('tanggal').value,
                kategori: document.getElementById('kategori').value,
                keterangan: document.getElementById('keterangan').value,
                metodeBayar: document.getElementById('metodeBayar').value,
                nominal: document.getElementById('nominal').value,
                catatan: document.getElementById('catatan').value
            };

            // Kirim data ke Google Apps Script menggunakan fetch API
            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors', // Penting agar tidak terkendala aturan CORS browser
                cache: 'no-cache',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(() => {
                // Tampilkan pesan sukses jika berhasil
                statusMessage.textContent = '🎉 Berhasil! Data sudah tercatat di Google Sheet.';
                statusMessage.className = 'mx-6 mb-6 p-3 rounded-xl text-center text-xs font-medium bg-emerald-100 text-emerald-700 block';
                
                // Reset form input (kecuali tanggal)
                form.reset();
                document.getElementById('tanggal').valueAsDate = new Date();
            })
            .catch(error => {
                // Tampilkan pesan error jika gagal
                statusMessage.textContent = '❌ Gagal mengirim data: ' + error;
                statusMessage.className = 'mx-6 mb-6 p-3 rounded-xl text-center text-xs font-medium bg-rose-100 text-rose-700 block';
            })
            .finally(() => {
                // Kembalikan tombol ke keadaan semula
                btnSimpan.disabled = false;
                btnSimpan.innerText = '✨ Simpan Pengeluaran';
            });
        });
    </script>
</body>
</html>
